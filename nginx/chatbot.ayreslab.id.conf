# /etc/nginx/sites-available/chatbot.ayreslab.id
# Reverse proxy for the 3 WhatsApp bots on a single subdomain.
#   chatbot.ayreslab.id/chatbot01  → 127.0.0.1:4001
#   chatbot.ayreslab.id/chatbot02  → 127.0.0.1:4002
#   chatbot.ayreslab.id/chatbot03  → 127.0.0.1:4003
#
# Each bot's Express app is already BASE_PATH-aware, so we forward the URI
# AS-IS (no /chatbotNN strip).

server {
    listen 80;
    listen [::]:80;
    server_name chatbot.ayreslab.id;

    # Let Certbot handle ACME, redirect everything else to HTTPS.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chatbot.ayreslab.id;

    # ssl_certificate     /etc/letsencrypt/live/chatbot.ayreslab.id/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/chatbot.ayreslab.id/privkey.pem;

    # Common proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_read_timeout 120s;

    location ^~ /chatbot01 { proxy_pass http://127.0.0.1:4001; }
    location ^~ /chatbot02 { proxy_pass http://127.0.0.1:4002; }
    location ^~ /chatbot03 { proxy_pass http://127.0.0.1:4003; }

    # Optional landing page at the subdomain root.
    location = / {
        return 200 "Ayres bot panel — try /chatbot01, /chatbot02, /chatbot03\n";
        add_header Content-Type text/plain;
    }
}
