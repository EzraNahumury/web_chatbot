# /etc/nginx/sites-available/chatbot.ayreslab.id
# Reverse proxy for the 3 WhatsApp bots on a single subdomain.
#   chatbot.ayreslab.id/chatbot01  → 127.0.0.1:4001
#   chatbot.ayreslab.id/chatbot02  → 127.0.0.1:4002
#   chatbot.ayreslab.id/chatbot03  → 127.0.0.1:4003
#
# Each bot's Express app is BASE_PATH-aware, so we forward URI as-is
# (no /chatbotNN strip).
#
# This file is HTTP-only. Run `certbot --nginx` to add SSL automatically.

server {
    listen 80;
    listen [::]:80;
    server_name chatbot.ayreslab.id;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_read_timeout 120s;

    location ^~ /chatbot01 { proxy_pass http://127.0.0.1:4001; }
    location ^~ /chatbot02 { proxy_pass http://127.0.0.1:4002; }
    location ^~ /chatbot03 { proxy_pass http://127.0.0.1:4003; }

    location = / {
        return 200 "Ayres bot panel - try /chatbot01, /chatbot02, /chatbot03\n";
        add_header Content-Type text/plain;
    }
}
