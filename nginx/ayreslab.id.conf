# /etc/nginx/sites-available/ayreslab.id
# Reverse proxy for the Next.js landing page on the apex (or its own subdomain).
# Adjust server_name to whatever domain points to the web app.

server {
    listen 80;
    listen [::]:80;
    server_name ayreslab.id www.ayreslab.id;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ayreslab.id www.ayreslab.id;

    # ssl_certificate     /etc/letsencrypt/live/ayreslab.id/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ayreslab.id/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
